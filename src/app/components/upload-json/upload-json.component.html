<div class="upload-modal">
  <div class="upload-modal-content">
    <div class="upload-modal-header">
      <h3>Cargar archivo JSON</h3>
      <button class="close-btn" (click)="closeModal()">✖</button>
    </div>
    <div class="upload-modal-body">
      <div 
        class="drop-zone"
        [class.dragging]="isDragging"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
      >
        <p *ngIf="!selectedFile">Arrastra tu archivo JSON aquí</p>
        <p *ngIf="selectedFile">{{ selectedFile.name }}</p>
      </div>

      <input type="file" (change)="onFileSelected($event)" accept=".json">

      <button class="upload-btn" (click)="uploadFile()">
        Subir archivo
      </button>
    </div>
  </div>
</div>
